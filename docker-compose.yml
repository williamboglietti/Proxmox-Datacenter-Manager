# Proxmox Datacenter Manager — docker compose up -d
services:
  pdm:
    image: ghcr.io/williamboglietti/proxmox-datacenter-manager:latest
    # build: .                       # build local au lieu de l'image publiée
    container_name: pdm
    hostname: pdm                    # nom du nœud affiché par PDM
    platform: linux/amd64            # PDM est amd64 uniquement
    restart: unless-stopped
    network_mode: bridge             # DNS de l'hôte reflétés tels quels dans l'UI
    ports:
      - "8443:8443"
    # Sans dns/dns_search : hérite du resolv.conf de l'hôte. Décommenter pour forcer.
    # dns:
    #   - 1.1.1.1
    #   - 9.9.9.9
    # dns_search:
    #   - lan.local
    environment:
      PDM_ROOT_PASSWORD: "change-me"     # root@pam, réappliqué à chaque démarrage
      DISABLE_SUBSCRIPTION_NAG: "true"   # popup "no valid subscription"
      DISABLE_UPDATES_TAB: "true"        # MAJ par image, pas par apt
      DISABLE_POWER_BUTTONS: "true"      # reboot/shutdown gérés via Docker
      DISABLE_SUBSCRIPTION_PANEL: "true" # entrée de menu "Abonnement" locale
      DISABLE_NETWORK_EDIT: "true"       # vue Réseau/heure en lecture seule
      DISABLE_REPOSITORIES: "true"       # masque l'onglet Dépôts + vide les sources apt
      TZ: "Europe/Paris"
      # PDM_PORT: "8443"
    # env_file:
    #   - .env
    volumes:
      - pdm-config:/etc/proxmox-datacenter-manager
      - pdm-data:/var/lib/proxmox-datacenter-manager
    tmpfs:
      - /run:exec,mode=0755          # évite "shmem is not on tmpfs"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--insecure", "https://localhost:8443/api2/json/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  pdm-config:
  pdm-data:
