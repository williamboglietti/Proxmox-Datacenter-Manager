# Journald en mode conteneur : journal volatile (en RAM, /run/log/journal),
# pas de collecte d'audit kernel (indisponible/inutile en conteneur).
# Permet à l'onglet « Journal système » de l'UI PDM d'afficher les logs des
# daemons, routés via systemd-cat depuis l'entrypoint.
[Journal]
Storage=volatile
Audit=no
